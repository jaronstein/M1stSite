name: Weekly Podcast Rebuild

on:
  schedule:
    # Every Wednesday at 7:00 AM UTC (30 min after RSS updates at 6:30 AM)
    - cron: '0 7 * * 3'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push empty commit to trigger Cloudflare rebuild
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: trigger weekly podcast rebuild"
          git push
